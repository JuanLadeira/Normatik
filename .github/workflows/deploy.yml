name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: ENV_PROD
          script: |
            set -e
            cd ${{ secrets.PROD_PATH }}

            echo "==> Escrevendo variáveis de ambiente..."
            echo "$ENV_PROD" > .env.prod

            echo "==> Atualizando código..."
            git pull origin main

            echo "==> Rebuilding imagens..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml build

            echo "==> Subindo containers..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Aguardando API ficar saudável..."
            timeout 60 bash -c 'until docker compose --env-file .env.prod -f docker-compose.prod.yml exec -T api uv run alembic current 2>/dev/null; do sleep 3; done'

            echo "==> Rodando migrações..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml exec -T api uv run alembic upgrade head

            echo "==> Limpando imagens antigas..."
            docker image prune -f

            echo "==> Deploy concluído."
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
