name: Tests

on:
  push:
    branches: [ main, master, develop, feature/* ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: normatik
          POSTGRES_PASSWORD: normatik
          POSTGRES_DB: normatik
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://normatik:normatik@localhost:5432/normatik
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      ENCRYPTION_KEY: D7Lg8YvE1WvXyv7eL5aK4pY6Q9V2b4N7c8D9E0F1G2H=
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: normatik
      S3_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev --frozen

      - name: Lint with Ruff
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: uv run pytest
