<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #fff; padding: 20px; color: #0F172A; }
  .label { font-size: 10px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .divider { height: 1px; background: #E2E8F0; margin: 14px 0; }
  .logo-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .logo-box { padding: 16px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: flex-end; padding: 5px 5px; gap: 2px; flex-shrink: 0; }
  .logo-bar { border-radius: 1px; flex: 1; }
  .wordmark { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
</style>
</head>
<body>

<div class="label">Logo — Light</div>
<div class="logo-row">
  <div class="logo-box" style="background:#F1F4F8">
    <div class="logo-icon" style="background:#1A3A6C">
      <div class="logo-bar" style="background:#00B5A4;height:12px"></div>
      <div class="logo-bar" style="background:#00B5A4;height:18px"></div>
      <div class="logo-bar" style="background:#fff;height:8px;opacity:0.6"></div>
      <div class="logo-bar" style="background:#fff;height:5px;opacity:0.4"></div>
    </div>
    <div class="wordmark" style="color:#1A3A6C">Normatiq</div>
  </div>

  <div class="logo-box" style="background:#F1F4F8">
    <div class="logo-icon" style="background:#1A3A6C">
      <div class="logo-bar" style="background:#00B5A4;height:12px"></div>
      <div class="logo-bar" style="background:#00B5A4;height:18px"></div>
      <div class="logo-bar" style="background:#fff;height:8px;opacity:0.6"></div>
      <div class="logo-bar" style="background:#fff;height:5px;opacity:0.4"></div>
    </div>
  </div>
</div>

<div class="divider"></div>

<div class="label">Logo — Dark</div>
<div class="logo-row">
  <div class="logo-box" style="background:#1A3A6C">
    <div class="logo-icon" style="background:#00B5A4">
      <div class="logo-bar" style="background:#1A3A6C;height:12px"></div>
      <div class="logo-bar" style="background:#1A3A6C;height:18px"></div>
      <div class="logo-bar" style="background:#fff;height:8px;opacity:0.5"></div>
      <div class="logo-bar" style="background:#fff;height:5px;opacity:0.3"></div>
    </div>
    <div class="wordmark" style="color:#fff">Normatiq</div>
  </div>
</div>

<div class="divider"></div>

<div class="label">Brand Palette</div>
<div style="display:flex;gap:10px">
  <div style="flex:1;height:40px;background:#1A3A6C;border-radius:6px;display:flex;align-items:flex-end;padding:5px 8px">
    <span style="font-size:10px;color:rgba(255,255,255,0.6);font-family:monospace">#1A3A6C</span>
  </div>
  <div style="flex:1;height:40px;background:#00B5A4;border-radius:6px;display:flex;align-items:flex-end;padding:5px 8px">
    <span style="font-size:10px;color:rgba(255,255,255,0.8);font-family:monospace">#00B5A4</span>
  </div>
  <div style="flex:1;height:40px;background:#F1F4F8;border-radius:6px;border:1px solid #E2E8F0;display:flex;align-items:flex-end;padding:5px 8px">
    <span style="font-size:10px;color:#94A3B8;font-family:monospace">#F1F4F8</span>
  </div>
  <div style="flex:1;height:40px;background:#0F172A;border-radius:6px;display:flex;align-items:flex-end;padding:5px 8px">
    <span style="font-size:10px;color:rgba(255,255,255,0.5);font-family:monospace">#0F172A</span>
  </div>
</div>

</body>
</html>
