<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #fff; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .swatch { height: 48px; }
  .section-label { font-size: 10px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .tokens { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  .token { display: flex; align-items: center; gap: 8px; }
  .dot { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: 10px; font-weight: 600; color: #334155; }
  .hex { font-size: 9px; color: #64748B; font-family: monospace; }
</style>
</head>
<body>

<div class="section-label">Neutral — Cool Gray</div>
<div class="grid">
  <div class="swatch" style="background:#FFFFFF;border:1px solid #E2E8F0"></div>
  <div class="swatch" style="background:#F8FAFC"></div>
  <div class="swatch" style="background:#F1F4F8"></div>
  <div class="swatch" style="background:#E2E8F0"></div>
  <div class="swatch" style="background:#CBD5E1"></div>
  <div class="swatch" style="background:#94A3B8"></div>
  <div class="swatch" style="background:#64748B"></div>
  <div class="swatch" style="background:#475569"></div>
  <div class="swatch" style="background:#334155"></div>
  <div class="swatch" style="background:#1E293B"></div>
  <div class="swatch" style="background:#0F172A"></div>
</div>

<div class="section-label">Semantic Aliases</div>
<div class="tokens">
  <div class="token"><div class="dot" style="background:#F1F4F8"></div><div><div class="name">bg-page</div><div class="hex">#F1F4F8</div></div></div>
  <div class="token"><div class="dot" style="background:#FFFFFF;border:1px solid #E2E8F0"></div><div><div class="name">bg-surface</div><div class="hex">#FFFFFF</div></div></div>
  <div class="token"><div class="dot" style="background:#F8FAFC"></div><div><div class="name">bg-subtle</div><div class="hex">#F8FAFC</div></div></div>
  <div class="token"><div class="dot" style="background:#0F172A"></div><div><div class="name">fg-default</div><div class="hex">#0F172A</div></div></div>
  <div class="token"><div class="dot" style="background:#64748B"></div><div><div class="name">fg-muted</div><div class="hex">#64748B</div></div></div>
  <div class="token"><div class="dot" style="background:#94A3B8"></div><div><div class="name">fg-subtle</div><div class="hex">#94A3B8</div></div></div>
  <div class="token"><div class="dot" style="background:#E2E8F0"></div><div><div class="name">border-default</div><div class="hex">#E2E8F0</div></div></div>
  <div class="token"><div class="dot" style="background:#CBD5E1"></div><div><div class="name">border-strong</div><div class="hex">#CBD5E1</div></div></div>
  <div class="token"><div class="dot" style="background:#2A6AC8"></div><div><div class="name">border-focus</div><div class="hex">#2A6AC8</div></div></div>
</div>

</body>
</html>
