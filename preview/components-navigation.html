<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: #F1F4F8; padding: 20px; color: #0F172A; }
  .label { font-size: 10px; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .sidebar { width: 220px; background: #1A3A6C; border-radius: 10px; padding: 16px 0; }
  .sidebar-logo { padding: 0 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: #00B5A4; border-radius: 6px; display: flex; align-items: center; justify-content: flex-end; flex-direction: column; padding: 5px 4px; gap: 2px; }
  .logo-bar { background: #fff; border-radius: 1px; width: 100%; }
  .logo-text { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
  .nav-section { padding: 0 8px; margin-bottom: 4px; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px; margin-bottom: 2px; margin-top: 12px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 120ms; }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active .nav-icon { color: #00B5A4; }
  .nav-icon { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .nav-badge { margin-left: auto; background: #DC2626; color: #fff; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 9999px; }
  .nav-badge-warn { background: #D97706; }
</style>
</head>
<body>

<div class="label">Sidebar Navigation</div>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <div class="logo-bar" style="height:5px"></div>
      <div class="logo-bar" style="height:8px"></div>
      <div class="logo-bar" style="height:3px;background:rgba(255,255,255,0.4)"></div>
    </div>
    <div class="logo-text">Normatiq</div>
  </div>

  <div class="nav-section">
    <div class="nav-item active">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" color="#00B5A4"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      Dashboard
    </div>
  </div>

  <div class="nav-section-label">Laboratório</div>
  <div class="nav-section">
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><line x1="8" y1="4" x2="8" y2="8"/><line x1="8" y1="8" x2="11" y2="8"/></svg>
      Calibrações
      <span class="nav-badge nav-badge-warn">5</span>
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l1.5 3h3l-2.5 2 1 3L8 8.5 5 10l1-3L3.5 5h3z"/></svg>
      Padrões
      <span class="nav-badge">1</span>
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="1"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/></svg>
      Certificados
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 5l-4-3H4a1 1 0 00-1 1v10a1 1 0 001 1h9a1 1 0 001-1V5z"/></svg>
      Pedidos
    </div>
  </div>

  <div class="nav-section-label">Cadastros</div>
  <div class="nav-section">
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 13c0-2.2 1.8-4 4-4h4c2.2 0 4 1.8 4 4"/><circle cx="8" cy="5" r="3"/></svg>
      Clientes
    </div>
    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="2" x2="4" y2="14"/><line x1="8" y1="2" x2="8" y2="14"/><line x1="12" y1="2" x2="12" y2="14"/><line x1="2" y1="5" x2="14" y2="5"/><line x1="2" y1="11" x2="14" y2="11"/></svg>
      Instrumentos
    </div>
  </div>
</div>

</body>
</html>
