<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normatiq — lab_app</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #F1F4F8; }
  body { font-family: 'IBM Plex Sans', sans-serif; color: #0F172A; }
  #root { height: 100%; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="CalibrationsModule.jsx"></script>
<script type="text/babel" src="StandardsModule.jsx"></script>
<script type="text/babel" src="CertificatesModule.jsx"></script>

<script type="text/babel">
// ─── TopBar ────────────────────────────────────────────────
const TopBar = ({ title, actions }) => (
  <div style={{
    height: 52, background: '#fff', borderBottom: '1px solid #E2E8F0',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 24px', flexShrink: 0,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <span style={{ fontSize: 15, fontWeight: 600, color: '#0F172A' }}>{title}</span>
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      {/* Notification bell */}
      <div style={{ position: 'relative', cursor: 'pointer', padding: 6, borderRadius: 6, color: '#64748B' }}
        onMouseEnter={e => e.currentTarget.style.background = '#F1F4F8'}
        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
        <IconBell size={16} />
        <span style={{
          position: 'absolute', top: 4, right: 4, width: 7, height: 7,
          background: '#DC2626', borderRadius: '50%', border: '1.5px solid #fff',
        }}></span>
      </div>
      {/* Lab name */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8, padding: '4px 10px',
        background: '#F1F4F8', borderRadius: 6, cursor: 'pointer',
      }}>
        <div style={{ width: 22, height: 22, background: '#1A3A6C', borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <span style={{ fontSize: 9, fontWeight: 700, color: '#fff' }}>N</span>
        </div>
        <span style={{ fontSize: 12, fontWeight: 500, color: '#334155' }}>Normatiq Demo Lab</span>
        <span style={{ fontSize: 10, color: '#94A3B8' }}>▾</span>
      </div>
    </div>
  </div>
);

// ─── Placeholder screens ────────────────────────────────────
const Placeholder = ({ title, icon: Icon }) => (
  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#F1F4F8', gap: 12, color: '#CBD5E1' }}>
    <Icon size={40} style={{ color: '#CBD5E1' }} />
    <div style={{ fontSize: 14, fontWeight: 500, color: '#94A3B8' }}>{title}</div>
    <div style={{ fontSize: 12, color: '#CBD5E1' }}>Em desenvolvimento</div>
  </div>
);

// ─── Main App ───────────────────────────────────────────────
const SCREEN_TITLES = {
  dashboard: 'Dashboard',
  calibracoes: 'Calibrações',
  padroes: 'Padrões de Referência',
  certificados: 'Certificados',
  pedidos: 'Pedidos e Ordens de Serviço',
  clientes: 'Clientes',
  instrumentos: 'Instrumentos',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00B5A4",
  "primaryColor": "#1A3A6C",
  "density": "comfortable"
}/*EDITMODE-END*/;

const App = () => {
  const [screen, setScreen] = React.useState(
    () => localStorage.getItem('normatiq_screen') || 'dashboard'
  );
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  const navigate = (s) => {
    setScreen(s);
    localStorage.setItem('normatiq_screen', s);
  };

  // Tweaks panel
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const alerts = { calibracoes: 5, padroes: 1 };

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard':    return <Dashboard onNav={navigate} />;
      case 'calibracoes':  return <CalibrationsModule onNav={navigate} />;
      case 'padroes':      return <StandardsModule />;
      case 'certificados': return <CertificatesModule />;
      default: return <Placeholder title={SCREEN_TITLES[screen] || screen} icon={IconGrid} />;
    }
  };

  // CSS vars from tweaks
  const cssVars = {
    '--brand-primary': tweaks.primaryColor,
    '--brand-accent': tweaks.accentColor,
  };

  return (
    <div style={{ display: 'flex', height: '100vh', ...cssVars }}>
      <Sidebar active={screen} onNav={navigate} alerts={alerts} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar title={SCREEN_TITLES[screen] || screen} />
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex' }}>
          {renderScreen()}
        </div>
      </div>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, background: '#fff', borderRadius: 10,
          border: '1px solid #E2E8F0', boxShadow: '0 10px 25px rgba(0,0,0,0.12)',
          padding: 18, width: 240, zIndex: 1000, fontFamily: "'IBM Plex Sans', sans-serif",
        }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: '#0F172A', marginBottom: 14, letterSpacing: '-0.01em' }}>Tweaks</div>

          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', marginBottom: 5 }}>Cor primária</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {['#1A3A6C','#1E3A5F','#1B4332','#3B1F6E'].map(c => (
                <div key={c} onClick={() => updateTweak('primaryColor', c)}
                  style={{ width: 24, height: 24, background: c, borderRadius: 4, cursor: 'pointer', border: tweaks.primaryColor === c ? '2px solid #0F172A' : '2px solid transparent', transition: 'border 100ms' }} />
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', marginBottom: 5 }}>Cor de destaque</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {['#00B5A4','#0EA5E9','#8B5CF6','#F59E0B'].map(c => (
                <div key={c} onClick={() => updateTweak('accentColor', c)}
                  style={{ width: 24, height: 24, background: c, borderRadius: 4, cursor: 'pointer', border: tweaks.accentColor === c ? '2px solid #0F172A' : '2px solid transparent', transition: 'border 100ms' }} />
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', marginBottom: 5 }}>Densidade</div>
            <div style={{ display: 'flex', gap: 4 }}>
              {['compact','comfortable'].map(d => (
                <button key={d} onClick={() => updateTweak('density', d)} style={{
                  flex: 1, padding: '4px 8px', borderRadius: 5, border: '1px solid',
                  fontSize: 11, fontFamily: "'IBM Plex Sans', sans-serif", cursor: 'pointer', fontWeight: 500,
                  background: tweaks.density === d ? '#1A3A6C' : '#F8FAFC',
                  color: tweaks.density === d ? '#fff' : '#475569',
                  borderColor: tweaks.density === d ? '#1A3A6C' : '#E2E8F0',
                }}>{d === 'compact' ? 'Compacto' : 'Confortável'}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
